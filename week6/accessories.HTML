<!DOCTYPE html>
<html>
<head>
    <title>Electronics</title>
    <style>
        body {
            margin: 0;
            background-color: aliceblue;
            font-family: sans-serif;
        }

        
        .products {
            grid-area: products;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            padding: 20px;
        }

        .product-card {
            background: white;
            border: 1px solid #ddd;
            padding: 20px;
            text-align: center;
            border-radius: 8px;
        }
        .p{
            text-align: center;
            background-color: tomato;
            align-items: center;
        }
        img{
            width: 120px;
            height: auto;
            border-radius: 8px;
        }
        

        .button {
            background-color: blue;
            color: white;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 50px;
            margin-top: 10px;
        }

        .button:hover {
            background-color: #7094ff;
        }
    </style>
</head>
<body>
        <div class="products">
            <div class="product-card">
                <img src="C:\Users\nspra\Downloads\s26watches.jpg.jpeg" alt="Samsung Galaxy Watch 6">
                <h3>Samsung Galaxy Watch 6</h3>
                <p>$169</p>
                <button class="button">Add to Cart</button>
            </div>
            <div class="product-card">
                <img src="C:\Users\nspra\Downloads\earpodes.jpg.jpeg" >
                <h3>Samsung Galaxy Buds 4</h3>
                <p>$249</p>
                <button class="button">Add to Cart</button>
            </div>
            <div class="product-card">
                <img src="C:\Users\nspra\Downloads\ring.jpg.jpeg">
                <h3>Samsung Galaxy ring </h3>
                <p>$459</p>
                <button class="button">Add to Cart</button>
            </div>
            <div class="product-card">
                <img src="C:\Users\nspra\Downloads\s26backcase.jpg.jpeg">
                <h3>Samsung S26 case </h3>
                <p>$59</p>
                <button class="button">Add to Cart</button>
            </div>
        </div>
</body>
