<!DOCTYPE html>
 <html>
    <body>
      <center>
       <h1 align="center">College Admission Registration</h1>
       <form>
        <table width="600" border="1" cellpadding="10" cellspacing="0" style="text-align:center;">
      <tr>
        <td>
            <label for="Full name">Full Name:</label>
            </td>
            <td>
            <input type="text" id="Full name" name="Full name">
        </td>
       </tr>  
        <tr>
          <td>
             <label for="email">Email:</label>
          </td>
          <td>
             <input type="text" id="email" name="email">
          </td>
        </tr>
        <tr>
           <td>
            <label for="phone number">Phone Number:</label>
           </td>
           <td>
            <input type="text" id="phone number" name="phone nummber">
           </td>
        </tr>
      <tr>
        <td>
         <label for="Gender">Gender:</label>
        </td>
        <td>
         <label for="male">Male</label>
         <input type="radio" id="male" name="male" value="male">
         <label for="female">Female</label>
         <input type="radio" id="female" name="male" value="female">
         <label for="other">Other</label>
         <input type="radio" id="other" name="male" value="other">
        </td>
      </tr>
      <tr>
         <td>
          <label for="Course Applying For">Course Applying For:</label>
         </td>
         <td>
            <select id="course" name="course">
            <option value="">--Select--</option>
            <option value="Btech">Btech</option>
            <option value="B.Sc">B.Sc</option>
            <option value="B.Com">B.Com</option>
            <option value="BBA">BBA</option>
            <option value="M.Tech">M.Tech</option> 
         </select>
         </td>
      </tr>
       <tr>
        <td>
         <label for="Hobbies">Hobbies:</label>
        </td>
        <td>
         <label for="Sports">Sports</label>
         <input type="checkbox" id="sports" name="sports" value="sports">
         <label for="Music">Music</label>
         <input type="checkbox" id="" name="music" value="music">
         <label for="Reading">Reading</label>
         <input type="checkbox" id="reading" name="reading" value="reading">
        </td>
      </tr>
       <tr>
        <td>
            <label for="Date Of Birth">Date Of Birth:</label>
        </td>
        <td>
            <input type="date" name="datemax" min="" max="">
        </td>
       </tr>
      <tr>
        <td>
            <label for="my file">Upload Certificates:</label>
        </td>
        <td>
            <input type="file" id="my file" name="my file" multiple>
        </td>
      </tr>
      <tr>
        <td>
            <label for="address">Address:</label>
        </td>
        <td>
            <textarea name="address" id="address" rows="5" cols="30"></textarea>
        </td>
     </tr>
     <tr>
        <td colspan="2" style:align="center">
         <input type="Submit" id="Submit" name="Submit" value="Submit">
         <input type="Reset" id="Reset" name="Reset" value="Reset">
         </td>
     </tr>
  </form>
</center>
  </body>
</html>
