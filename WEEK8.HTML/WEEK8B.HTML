<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin: 0;
    }
    h1{
        text-align: center;
    }
    .ball {
      width: 70px;
      height: 70px;
      background: rgb(236, 224, 5);
      border-radius: 100%;
      animation: updown 3s linear infinite;
    }
    @keyframes updown {
      0% { transform: translateY(550px); }
      50% { transform: translateY(-50px); }
      100% { transform: translateY(550px); }
    }
  </style>
</head>
<body>
    <h1>A ball that moves Up and Down continuously</h1><br>
  <div class="ball"></div>
</body>
</html>
